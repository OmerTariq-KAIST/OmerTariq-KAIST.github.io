short_bio: >-
  <p>
    I am a <strong>Research Scientist at <a href="https://www.neubility.co.kr/en" target="_blank">Neubility</a></strong> (Seoul), working on multimodal embodied AI and 3D perception for autonomous mobile robots. I hold a <strong>Ph.D. in Computer Science from KAIST</strong> (2025), advised by Prof. Dongsoo Han.
  </p>
  <p>
    My work spans <strong>multi-camera 3D perception</strong> (BEV/occupancy modeling, monocular depth estimation, multi-sensor fusion), <strong>Vision-Language-Action models</strong>, and <strong>efficient edge deployment</strong> on NVIDIA Jetson Orin via TensorRT and INT8/FP16 quantization. I build production-grade perception systems that run in under 30&thinsp;ms end-to-end on a single SoC.
  </p>
  <p>
    Previously, I was a Machine Learning Engineer at <strong>Monitra (UK)</strong> and a PhD researcher at KAIST's Intelligent Service Integration Lab, where I designed neural inertial navigation architectures, privacy-preserving federated learning systems, and FPGA-based SLAM accelerators.
  </p>

